<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0A65FF" />
    <!--
      Per-page <title>, description, canonical, Open Graph and Twitter tags are
      rendered by client/src/components/RouteSeo.tsx (React 19 hoists document
      metadata into <head>), and baked into the static HTML for every route by
      the build-time prerender step (scripts/prerender.mjs). Keep this shell
      free of a static <title>/description so there are no duplicate tags.
    -->
    <link rel="icon" type="image/png" href="/dt-mark.png" />
    <link rel="apple-touch-icon" href="/dt-mark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Organization + WebSite structured data (always present in the shell). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://dt.dtapps.io/#organization",
            "name": "Digital Therapy",
            "url": "https://dt.dtapps.io/",
            "logo": "https://dt.dtapps.io/dtlogo.png",
            "description": "Digital Therapy builds private operating layers for modern family offices, unifying data, workflows, reporting, automation, and security.",
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "sales",
              "email": "hello@digitaltherapy.io"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://dt.dtapps.io/#website",
            "url": "https://dt.dtapps.io/",
            "name": "Digital Therapy",
            "publisher": { "@id": "https://dt.dtapps.io/#organization" }
          }
        ]
      }
    </script>

    <!--
      Umami analytics (self-hosted at analytics.dtapps.io). data-domains limits
      tracking to the production host, so the build-time prerender (which loads
      pages on 127.0.0.1) self-disables and never sends build hits.
    -->
    <script
      defer
      src="https://analytics.dtapps.io/script.js"
      data-website-id="0b1f9eb0-c190-4c70-8b28-9985e1c3cb07"
      data-domains="dt.dtapps.io"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
